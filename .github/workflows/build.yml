name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Set up Maven 3.9.16
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.16

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.1.0
        with:
          mirrors: |
            [{
              "id": "ukheshe-group-release-mirror",
              "name": "Direct to Our Repo",
              "url": "https://mvn.ukheshe.rocks/artifactory/libs-release",
              "mirrorOf": "com.ukheshe*"
            }]
          servers: |
            [{
              "id": "JGREL",
              "username": "${{ secrets.JGREL_USERNAME }}",
              "password": "${{ secrets.JGREL_PASSWORD }}"
            }]
          repositories: |
            [{
              "id": "JGREL",
              "url": "https://mvn.ukheshe.rocks/artifactory/libs-release",
              "releases": { "enabled": true, "updatePolicy": "daily" },
              "snapshots": { "enabled": false }
            }]
          pluginRepositories: |
            [{
              "id": "JGREL",
              "url": "https://mvn.ukheshe.rocks/artifactory/libs-release",
              "releases": { "enabled": true, "updatePolicy": "daily" },
              "snapshots": { "enabled": false }
            }]

      - name: Build jar
        run: mvn -B clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: plugin-payment-jar
          path: target/*.jar

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: plugin-payment-jar
          path: artifact

      - name: Login
        id: login
        run: |
          RESPONSE=$(curl -sf -X POST "${{ secrets.LOGIN_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"identity\":\"${{ secrets.LOGIN_USERNAME }}\",\"password\":\"${{ secrets.LOGIN_PASSWORD }}\"}")
          HEADER_VALUE=$(echo "$RESPONSE" | jq -r '.headerValue')
          echo "::add-mask::$HEADER_VALUE"
          echo "header_value=$HEADER_VALUE" >> "$GITHUB_OUTPUT"

      - name: Upload plugin
        run: |
          JAR_FILE=$(find artifact -maxdepth 1 -name '*.jar' | head -n1)
          BASE64_JAR=$(base64 -w 0 "$JAR_FILE")
          curl -sf -X POST "${{ secrets.UPLOAD_URL }}" \
            -H "Authorization: ${{ steps.login.outputs.header_value }}" \
            -H "Content-Type: application/json" \
            -d "{\"base64EncodedJar\":\"$BASE64_JAR\",\"versionDescription\":\"Github Actions Run\"}"

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"

          if [ "$BUILD_RESULT" = "success" ] && { [ "$DEPLOY_RESULT" = "success" ] || [ "$DEPLOY_RESULT" = "skipped" ]; }; then
            STATUS="✅ SUCCESS"
          else
            STATUS="❌ FAILURE"
          fi

          TEXT="$STATUS - ${{ github.repository }} (${{ github.ref_name }})
          Build: $BUILD_RESULT
          Deploy: $DEPLOY_RESULT
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$TEXT"
